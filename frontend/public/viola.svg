<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Viola silhouette -->
  <ellipse cx="50" cy="60" rx="25" ry="30" fill="#8B4513" stroke="#5C2E00" stroke-width="2"/>
  <ellipse cx="50" cy="30" rx="15" ry="18" fill="#8B4513" stroke="#5C2E00" stroke-width="2"/>
  <rect x="47" y="10" width="6" height="80" fill="#5C2E00" rx="2"/>
  <!-- f-holes -->
  <path d="M40 50 Q38 55 40 60" fill="none" stroke="#3A1E00" stroke-width="1.5"/>
  <path d="M60 50 Q62 55 60 60" fill="none" stroke="#3A1E00" stroke-width="1.5"/>
  <!-- Bridge -->
  <rect x="42" y="55" width="16" height="3" fill="#DEB887" rx="1"/>
  <!-- Strings -->
  <line x1="44" y1="15" x2="44" y2="85" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="48" y1="15" x2="48" y2="85" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="52" y1="15" x2="52" y2="85" stroke="#DAA520" stroke-width="0.5"/>
  <line x1="56" y1="15" x2="56" y2="85" stroke="#DAA520" stroke-width="0.5"/>
  <!-- Tailpiece -->
  <rect x="43" y="78" width="14" height="8" fill="#3A1E00" rx="1"/>
  <!-- Scroll -->
  <circle cx="50" cy="8" r="4" fill="#5C2E00"/>
  <!-- Tuning pegs -->
  <rect x="40" y="6" width="4" height="2" fill="#5C2E00" rx="1"/>
  <rect x="44" y="5" width="4" height="2" fill="#5C2E00" rx="1"/>
  <rect x="52" y="5" width="4" height="2" fill="#5C2E00" rx="1"/>
  <rect x="56" y="6" width="4" height="2" fill="#5C2E00" rx="1"/>
</svg>
